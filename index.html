<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorMatch - Connect & Grow</title>
    <meta name="description" content="MentorMatch connects mentors and mentees. Sign up to share your expertise or find guidance.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Home View -->
    <div id="viewHome" class="view">
        <div class="home-inner">
            <div class="home-hero">
                <div class="hero-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </div>
                <h1>Connect. Learn. Grow.</h1>
                <p>Join a community where knowledge meets ambition. Whether you're here to guide or to grow, your journey starts here.</p>
            </div>

            <div class="card-grid">
                <button class="role-card card-mentor" id="btnMentor">
                    <div class="card-icon icon-indigo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><polyline points="16 11 18 13 22 9"/></svg>
                    </div>
                    <h2>I'm a Mentor</h2>
                    <p>Share your expertise and help others succeed</p>
                    <span class="card-cta cta-indigo">
                        Get Started
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </span>
                </button>

                <button class="role-card card-mentee" id="btnMentee">
                    <div class="card-icon icon-emerald">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    </div>
                    <h2>I'm a Mentee</h2>
                    <p>Find guidance and accelerate your growth</p>
                    <span class="card-cta cta-emerald">
                        Get Started
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </span>
                </button>
            </div>

            <p class="social-proof">Join hundreds of professionals already connecting</p>
        </div>
    </div>

    <!-- Form View -->
    <div id="viewForm" class="view" style="display:none;">
        <div class="form-inner">
            <button class="back-btn" id="btnBack">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back
            </button>

            <!-- Success state -->
            <div id="successPanel" class="form-card text-center" style="display:none;">
                <div class="success-icon" id="successIcon"></div>
                <h2>Thank You!</h2>
                <p>We've received your interest. We'll be in touch soon!</p>
            </div>

            <!-- Form state -->
            <div id="formPanel" class="form-card">
                <div class="form-header">
                    <h2 id="formTitle"></h2>
                    <p id="formSubtitle"></p>
                </div>

                <form id="registrationForm">
                    <input type="hidden" name="role" id="fieldRole">

                    <div class="field">
                        <label for="fieldName">Full Name</label>
                        <input type="text" id="fieldName" name="name" placeholder="Your name" required>
                    </div>

                    <div class="field">
                        <label for="fieldEmail">Email Address</label>
                        <input type="email" id="fieldEmail" name="email" placeholder="you@example.com" required>
                    </div>

                    <div class="field">
                        <label for="fieldExpertise" id="labelExpertise"></label>
                        <input type="text" id="fieldExpertise" name="expertise" required>
                    </div>

                    <div class="field">
                        <label for="fieldMessage" id="labelMessage"></label>
                        <textarea id="fieldMessage" name="message" rows="4" required></textarea>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        Submit Interest
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
